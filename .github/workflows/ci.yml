name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install backend dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libsqlite3-dev libssh2-1-dev pkg-config

      - name: Configure backend
        working-directory: backend
        run: cmake -S . -B build

      - name: Build backend
        working-directory: backend
        run: cmake --build build --target endoriumfort_backend endoriumfort_backend_tests -j"$(nproc)"

      - name: Run backend tests
        working-directory: backend/build
        run: ctest --output-on-failure

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  agent-build-test:
    name: Agent Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache-dependency-path: agent/go.sum

      - name: Run agent tests
        working-directory: agent
        run: go test ./...

      - name: Build agent
        working-directory: agent
        run: go build ./...
