name: Build & Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g. latest, v0.4.0)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write

env:
  DOCKERHUB_REPO: nergyr/endoriumfort
  GHCR_REPO: ghcr.io/nergyr/endoriumfort

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ env.DOCKERHUB_REPO }}:${VERSION}" >> "$GITHUB_OUTPUT"
            echo "${{ env.DOCKERHUB_REPO }}:latest" >> "$GITHUB_OUTPUT"
            echo "${{ env.GHCR_REPO }}:${VERSION}" >> "$GITHUB_OUTPUT"
            echo "${{ env.GHCR_REPO }}:latest" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.inputs.tag || 'latest' }}"
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ env.DOCKERHUB_REPO }}:${TAG}" >> "$GITHUB_OUTPUT"
            echo "${{ env.GHCR_REPO }}:${TAG}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=EndoriumFort
            org.opencontainers.image.description=Privileged Access Management (PAM) Bastion
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=https://github.com/NergYR/EndoriumFort
            org.opencontainers.image.vendor=NergYR

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.version }}"
