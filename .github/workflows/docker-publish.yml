name: Build & Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g. latest, v0.4.0)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write
  id-token: write

env:
  DOCKERHUB_REPO: nergyr/endoriumfort
  GHCR_REPO: ghcr.io/nergyr/endoriumfort

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ env.DOCKERHUB_REPO }}:${VERSION}" >> "$GITHUB_OUTPUT"
            echo "${{ env.DOCKERHUB_REPO }}:latest" >> "$GITHUB_OUTPUT"
            echo "${{ env.GHCR_REPO }}:${VERSION}" >> "$GITHUB_OUTPUT"
            echo "${{ env.GHCR_REPO }}:latest" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.inputs.tag || 'latest' }}"
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ env.DOCKERHUB_REPO }}:${TAG}" >> "$GITHUB_OUTPUT"
            echo "${{ env.GHCR_REPO }}:${TAG}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build_push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=EndoriumFort
            org.opencontainers.image.description=Privileged Access Management (PAM) Bastion
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=https://github.com/NergYR/EndoriumFort
            org.opencontainers.image.vendor=NergYR

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign published container images (keyless)
        env:
          DIGEST: ${{ steps.build_push.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.DOCKERHUB_REPO }}@${DIGEST}"
          cosign sign --yes "${{ env.GHCR_REPO }}@${DIGEST}"

      - name: Create and attach provenance attestation
        env:
          DIGEST: ${{ steps.build_push.outputs.digest }}
        run: |
          cat > provenance.json <<JSON
          {
            "_type": "https://in-toto.io/Statement/v0.1",
            "subject": [
              {"name": "endoriumfort-image", "digest": {"sha256": "${DIGEST#sha256:}"}}
            ],
            "predicateType": "https://slsa.dev/provenance/v1",
            "predicate": {
              "buildType": "github-actions",
              "builder": {"id": "https://github.com/${{ github.repository }}"},
              "invocation": {"configSource": {"uri": "${{ github.server_url }}/${{ github.repository }}"}}
            }
          }
          JSON
          cosign attest --yes --predicate provenance.json "${{ env.DOCKERHUB_REPO }}@${DIGEST}"
          cosign attest --yes --predicate provenance.json "${{ env.GHCR_REPO }}@${DIGEST}"

      - name: Verify container image signatures
        env:
          DIGEST: ${{ steps.build_push.outputs.digest }}
        run: |
          cosign verify --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer-regexp ".*" \
            "${{ env.DOCKERHUB_REPO }}@${DIGEST}" >/dev/null
          cosign verify --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer-regexp ".*" \
            "${{ env.GHCR_REPO }}@${DIGEST}" >/dev/null

      - name: Verify container image attestations
        env:
          DIGEST: ${{ steps.build_push.outputs.digest }}
        run: |
          cosign verify-attestation --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer-regexp ".*" \
            --type slsaprovenance \
            "${{ env.DOCKERHUB_REPO }}@${DIGEST}" >/dev/null
          cosign verify-attestation --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer-regexp ".*" \
            --type slsaprovenance \
            "${{ env.GHCR_REPO }}@${DIGEST}" >/dev/null

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.build_push.outputs.digest }}"
