name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '30 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: c-cpp
            language: c-cpp
            key: cpp
          - name: javascript-typescript
            language: javascript-typescript
            key: javascript
          - name: go
            language: go
            key: go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Install backend dependencies (cpp)
        if: matrix.key == 'cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libsqlite3-dev libssh2-1-dev pkg-config

      - name: Build backend (cpp)
        if: matrix.key == 'cpp'
        run: |
          cd backend
          cmake -S . -B build
          cmake --build build --target endoriumfort_backend -j"$(nproc)"

      - name: Setup Node (javascript)
        if: matrix.key == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (javascript)
        if: matrix.key == 'javascript'
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup Go (go)
        if: matrix.key == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: agent/go.sum

      - name: Build agent (go)
        if: matrix.key == 'go'
        run: |
          cd agent
          go test ./...
          go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/endoriumfort-codeql/${{ github.workflow }}/${{ matrix.key }}"
