name: Release Agent

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache-dependency-path: agent/go.sum

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build agent binaries
        working-directory: agent
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          LDFLAGS="-X main.version=${VERSION} -s -w"

          echo "Building EndoriumFortAgent ${VERSION}..."

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o ../release/endoriumfort-agent-linux-amd64 .
          echo "  ✓ Linux amd64"

          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" \
            -o ../release/endoriumfort-agent-linux-arm64 .
          echo "  ✓ Linux arm64"

          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o ../release/endoriumfort-agent-windows-amd64.exe .
          echo "  ✓ Windows amd64"

          # macOS amd64 (Intel)
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o ../release/endoriumfort-agent-darwin-amd64 .
          echo "  ✓ macOS amd64"

          # macOS arm64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" \
            -o ../release/endoriumfort-agent-darwin-arm64 .
          echo "  ✓ macOS arm64"

          # Relay daemon Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o ../release/endoriumfort-relay-linux-amd64 ./cmd/endoriumfort-relay
          echo "  ✓ Relay Linux amd64"

      - name: Generate checksums
        working-directory: release
        run: sha256sum endoriumfort-agent-* > checksums-sha256.txt

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign checksums (keyless)
        working-directory: release
        run: |
          cosign sign-blob --yes checksums-sha256.txt \
            --bundle checksums-sha256.txt.bundle.json

      - name: Sign linux amd64 binary (keyless)
        working-directory: release
        run: |
          cosign sign-blob --yes endoriumfort-agent-linux-amd64 \
            --bundle endoriumfort-agent-linux-amd64.bundle.json

      - name: Verify signed release blobs
        working-directory: release
        run: |
          cosign verify-blob \
            --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer-regexp ".*" \
            --bundle checksums-sha256.txt.bundle.json \
            checksums-sha256.txt >/dev/null
          cosign verify-blob \
            --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer-regexp ".*" \
            --bundle endoriumfort-agent-linux-amd64.bundle.json \
            endoriumfort-agent-linux-amd64 >/dev/null

      - name: Generate repository SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: release/repository-sbom.cdx.json

      - name: Sign SBOM (keyless)
        working-directory: release
        run: |
          cosign sign-blob --yes repository-sbom.cdx.json \
            --bundle repository-sbom.cdx.json.bundle.json

      - name: Verify signed SBOM
        working-directory: release
        run: |
          cosign verify-blob \
            --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer-regexp ".*" \
            --bundle repository-sbom.cdx.json.bundle.json \
            repository-sbom.cdx.json >/dev/null

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EndoriumFort ${{ steps.version.outputs.VERSION }}"
          body: |
            ## EndoriumFort Agent ${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux | amd64 | `endoriumfort-agent-linux-amd64` |
            | Linux | arm64 | `endoriumfort-agent-linux-arm64` |
            | Linux (Relay) | amd64 | `endoriumfort-relay-linux-amd64` |
            | Windows | amd64 | `endoriumfort-agent-windows-amd64.exe` |
            | macOS | Intel | `endoriumfort-agent-darwin-amd64` |
            | macOS | Apple Silicon | `endoriumfort-agent-darwin-arm64` |

            ### Usage
            ```bash
            # Linux / macOS — make executable
            chmod +x endoriumfort-agent-*

            # Login
            ./endoriumfort-agent -server https://your-server:8080 login -user admin

            # List resources
            ./endoriumfort-agent -server https://your-server:8080 list

            # Connect to a resource
            ./endoriumfort-agent -server https://your-server:8080 connect -resource <id>
            ```

            ### Verify checksums
            ```bash
            sha256sum -c checksums-sha256.txt
            ```
          files: |
            release/endoriumfort-agent-linux-amd64
            release/endoriumfort-agent-linux-arm64
            release/endoriumfort-relay-linux-amd64
            release/endoriumfort-agent-windows-amd64.exe
            release/endoriumfort-agent-darwin-amd64
            release/endoriumfort-agent-darwin-arm64
            release/checksums-sha256.txt
            release/checksums-sha256.txt.bundle.json
            release/endoriumfort-agent-linux-amd64.bundle.json
            release/repository-sbom.cdx.json
            release/repository-sbom.cdx.json.bundle.json
          generate_release_notes: true

  linux-installers:
    runs-on: ubuntu-latest
    needs: [build-and-release]
    env:
      APT_GPG_PRIVATE_KEY_BASE64: ${{ secrets.APT_GPG_PRIVATE_KEY_BASE64 }}
      APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
      APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache-dependency-path: agent/go.sum

      - name: Setup Ruby (for fpm)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          gem install --no-document fpm

      - name: Build Linux agent binaries
        working-directory: agent
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-X main.version=${VERSION} -s -w"
          mkdir -p ../release
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o ../release/endoriumfort-agent-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o ../release/endoriumfort-agent-linux-arm64 .
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o ../release/endoriumfort-relay-linux-amd64 ./cmd/endoriumfort-relay

      - name: Build DEB and RPM packages
        run: |
          chmod +x agent/packaging/linux/build-packages.sh
          VERSION="${GITHUB_REF_NAME#v}" bash agent/packaging/linux/build-packages.sh

      - name: Build APT-specific relay and web-bastion DEB packages
        run: |
          chmod +x agent/packaging/linux/build-apt-packages.sh
          VERSION="${GITHUB_REF_NAME#v}" bash agent/packaging/linux/build-apt-packages.sh

      - name: Generate Linux installer checksums
        working-directory: release/packages/linux
        run: sha256sum *.deb *.rpm > checksums-sha256.txt

      - name: Upload Linux installers to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/packages/linux/*.deb
            release/packages/linux/*.rpm
            release/packages/linux/checksums-sha256.txt

      - name: Install APT repository tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Build APT repository metadata
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          APT_ROOT="release/apt-repo"
          DIST_DIR_AMD64="$APT_ROOT/dists/stable/main/binary-amd64"
          DIST_DIR_ALL="$APT_ROOT/dists/stable/main/binary-all"
          mkdir -p "$DIST_DIR_AMD64" "$DIST_DIR_ALL"

          cp release/packages/linux/*_amd64.deb "$DIST_DIR_AMD64" || true
          cp release/packages/linux/*_all.deb "$DIST_DIR_ALL" || true

          if ! compgen -G "$DIST_DIR_AMD64/*.deb" > /dev/null && ! compgen -G "$DIST_DIR_ALL/*.deb" > /dev/null; then
            echo "No DEB packages found for APT repository" >&2
            exit 1
          fi

          if compgen -G "$DIST_DIR_AMD64/*.deb" > /dev/null; then
            dpkg-scanpackages "$DIST_DIR_AMD64" /dev/null > "$DIST_DIR_AMD64/Packages"
            gzip -9 -f -k "$DIST_DIR_AMD64/Packages"
          fi

          if compgen -G "$DIST_DIR_ALL/*.deb" > /dev/null; then
            dpkg-scanpackages "$DIST_DIR_ALL" /dev/null > "$DIST_DIR_ALL/Packages"
            gzip -9 -f -k "$DIST_DIR_ALL/Packages"
          fi

          apt-ftparchive \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Architectures="amd64 all" \
            release "$APT_ROOT/dists/stable" > "$APT_ROOT/dists/stable/Release"

          printf '%s\n' \
            '<html><body>' \
            '<h1>EndoriumFort APT Repository</h1>' \
            '<p>Repository URL:</p>' \
            "<pre>deb [signed-by=/etc/apt/keyrings/endoriumfort-archive-keyring.asc] https://${REPO_OWNER}.github.io/${REPO_NAME}/apt stable main</pre>" \
            '</body></html>' \
            > "$APT_ROOT/index.html"

      - name: Sign APT repository metadata (optional)
        if: ${{ env.APT_GPG_PRIVATE_KEY_BASE64 != '' }}
        run: |
          set -euo pipefail
          GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          echo "$APT_GPG_PRIVATE_KEY_BASE64" | base64 -d > "$RUNNER_TEMP/apt-signing-key.asc"
          gpg --batch --import "$RUNNER_TEMP/apt-signing-key.asc"

          KEY_REF="${APT_GPG_KEY_ID:-}"
          if [[ -z "$KEY_REF" ]]; then
            KEY_REF="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          fi
          if [[ -z "$KEY_REF" ]]; then
            echo "Unable to determine signing key fingerprint" >&2
            exit 1
          fi

          gpg --batch --yes --armor --export "$KEY_REF" > release/apt-repo/public.key

          SIGN_ARGS=(--batch --yes --pinentry-mode loopback --default-key "$KEY_REF")
          if [[ -n "${APT_GPG_PASSPHRASE:-}" ]]; then
            SIGN_ARGS+=(--passphrase "$APT_GPG_PASSPHRASE")
          fi

          gpg "${SIGN_ARGS[@]}" --clearsign \
            --output release/apt-repo/dists/stable/InRelease \
            release/apt-repo/dists/stable/Release

          gpg "${SIGN_ARGS[@]}" --detach-sign --armor \
            --output release/apt-repo/dists/stable/Release.gpg \
            release/apt-repo/dists/stable/Release

      - name: Publish APT repository to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: release/apt-repo
          destination_dir: apt
          keep_files: true

  macos-installers:
    runs-on: macos-latest
    needs: [build-and-release]
    env:
      APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
      APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
      APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache-dependency-path: agent/go.sum

      - name: Build macOS agent binaries
        working-directory: agent
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-X main.version=${VERSION} -s -w"
          mkdir -p ../release
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o ../release/endoriumfort-agent-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o ../release/endoriumfort-agent-darwin-arm64 .

      - name: Build PKG installers
        run: |
          chmod +x agent/packaging/macos/build-pkg.sh
          VERSION="${GITHUB_REF_NAME#v}" BINARY="$GITHUB_WORKSPACE/release/endoriumfort-agent-darwin-amd64" ARCH="amd64" bash agent/packaging/macos/build-pkg.sh
          VERSION="${GITHUB_REF_NAME#v}" BINARY="$GITHUB_WORKSPACE/release/endoriumfort-agent-darwin-arm64" ARCH="arm64" bash agent/packaging/macos/build-pkg.sh

      - name: Notarize macOS PKG installers (optional)
        if: ${{ env.APPLE_NOTARY_APPLE_ID != '' && env.APPLE_NOTARY_TEAM_ID != '' && env.APPLE_NOTARY_PASSWORD != '' }}
        run: |
          for pkg in release/packages/macos/*.pkg; do
            xcrun notarytool submit "$pkg" \
              --apple-id "$APPLE_NOTARY_APPLE_ID" \
              --team-id "$APPLE_NOTARY_TEAM_ID" \
              --password "$APPLE_NOTARY_PASSWORD" \
              --wait
            xcrun stapler staple "$pkg"
          done

      - name: Generate macOS installer checksums
        working-directory: release/packages/macos
        run: shasum -a 256 *.pkg > checksums-sha256.txt

      - name: Upload macOS installers to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/packages/macos/*.pkg
            release/packages/macos/checksums-sha256.txt

  windows-installers:
    runs-on: windows-latest
    needs: [build-and-release]
    env:
      WINDOWS_SIGN_PFX_BASE64: ${{ secrets.WINDOWS_SIGN_PFX_BASE64 }}
      WINDOWS_SIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache-dependency-path: agent/go.sum

      - name: Build Windows agent binary
        working-directory: agent
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart('v')
          $ldflags = "-X main.version=$version -s -w"
          New-Item -ItemType Directory -Path ..\release -Force | Out-Null
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -ldflags $ldflags -o ..\release\endoriumfort-agent-windows-amd64.exe .

      - name: Install WiX CLI
        shell: pwsh
        run: |
          dotnet tool install --global wix
          "$env:USERPROFILE\\.dotnet\\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $wixVersion = (wix --version).Trim()

          $uiExtInstalled = $false
          & wix extension add -g "WixToolset.UI.wixext/$wixVersion"
          if ($LASTEXITCODE -eq 0) {
            $uiExtInstalled = $true
          }

          if (-not $uiExtInstalled) {
            & wix extension add -g WixToolset.UI.wixext
            if ($LASTEXITCODE -eq 0) {
              $uiExtInstalled = $true
            }
          }

          if (-not $uiExtInstalled) {
            Write-Host "WiX UI extension install skipped; build script will fallback without branded UI if needed."
          }

          & wix extension list
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No WiX extensions listed."
            $global:LASTEXITCODE = 0
          }

      - name: Build MSI installer
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart('v')
          .\agent\packaging\windows\build-msi.ps1 -Version $version -BinaryPath .\release\endoriumfort-agent-windows-amd64.exe -OutputDir .\release\packages\windows

      - name: Code sign MSI installers (optional)
        if: ${{ env.WINDOWS_SIGN_PFX_BASE64 != '' && env.WINDOWS_SIGN_PFX_PASSWORD != '' }}
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_SIGN_PFX_BASE64))
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:WINDOWS_SIGN_PFX_PASSWORD -Force -AsPlainText) | Out-Null

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe not found" }

          Get-ChildItem -Path "release/packages/windows" -Filter *.msi | ForEach-Object {
            & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $pfxPath /p $env:WINDOWS_SIGN_PFX_PASSWORD $_.FullName
          }

      - name: Generate Windows installer checksums
        shell: pwsh
        run: |
          $path = "release/packages/windows"
          Get-ChildItem -Path $path -Filter *.msi | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $_.FullName).Hash.ToLower()
            "$hash  $($_.Name)"
          } | Set-Content -Path "$path/checksums-sha256.txt" -Encoding utf8

      - name: Upload Windows installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/packages/windows/*.msi
            release/packages/windows/checksums-sha256.txt
