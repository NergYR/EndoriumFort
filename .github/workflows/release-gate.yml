name: Release Gate

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog-gate:
    name: Changelog & Migration Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce changelog updates for code changes
        if: github.actor != 'dependabot[bot]'
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -Eq '^(backend/src/|frontend/src/|agent/main.go)'; then
            if ! echo "$CHANGED" | grep -Eq '^CHANGELOG.md$'; then
              echo "ERROR: CHANGELOG.md must be updated for backend/frontend/agent runtime changes." >&2
              exit 1
            fi
          fi

      - name: Enforce migration section in PR body when schema/config changes
        if: github.actor != 'dependabot[bot]'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

          if echo "$CHANGED" | grep -Eq '^(backend/src/database|backend/src/routes|docker-compose.yml|Dockerfile|frontend/package.json|agent/main.go)'; then
            if ! echo "$PR_BODY" | grep -Eiq '(migration|breaking change|upgrade)'; then
              echo "ERROR: PR body must include migration/upgrade notes for potentially breaking operational changes." >&2
              exit 1
            fi
          fi

  backend-gate:
    name: Backend Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install backend dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libsqlite3-dev libssh2-1-dev pkg-config
      - name: Configure
        working-directory: backend
        run: cmake -S . -B build
      - name: Build
        working-directory: backend
        run: cmake --build build --target endoriumfort_backend endoriumfort_backend_tests -j"$(nproc)"
      - name: Test
        working-directory: backend/build
        run: ctest --output-on-failure | tee ../../backend-ctest.log

      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ctest-log
          path: backend-ctest.log

  frontend-gate:
    name: Frontend Unit Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Unit/API tests
        working-directory: frontend
        run: npm test | tee ../frontend-unit.log
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend unit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-unit-log
          path: frontend/frontend-unit.log

  frontend-e2e-gate:
    name: Frontend E2E Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install backend dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libsqlite3-dev libssh2-1-dev pkg-config

      - name: Build backend for e2e
        working-directory: backend
        run: |
          cmake -S . -B build
          cmake --build build --target endoriumfort_backend -j"$(nproc)"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend/build
        run: ./endoriumfort_backend > ../../backend-e2e.log 2>&1 &

      - name: Start frontend dev server
        working-directory: frontend
        run: npm run dev -- --host 127.0.0.1 --port 5173 > ../frontend-e2e.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:8080/api/health >/dev/null && curl -sf http://127.0.0.1:5173 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Services did not become ready" >&2
          exit 1

      - name: Run e2e tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
          E2E_USER: admin
          E2E_PASSWORD: Admin123
        run: npm run test:e2e

      - name: Upload playwright report on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report

      - name: Upload e2e runtime logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-runtime-logs
          path: |
            backend-e2e.log
            frontend-e2e.log

      - name: Print logs on failure
        if: failure()
        run: |
          echo "--- backend-e2e.log ---"
          cat backend-e2e.log || true
          echo "--- frontend-e2e.log ---"
          cat frontend-e2e.log || true

  agent-gate:
    name: Agent Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache-dependency-path: agent/go.sum
      - name: Agent tests
        working-directory: agent
        run: go test ./...
      - name: Agent build
        working-directory: agent
        run: go build ./...

  supply-chain-gate:
    name: Supply Chain Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend dependency audit
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache-dependency-path: agent/go.sum

      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd agent
          govulncheck ./...

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign SBOM (keyless)
        run: |
          cosign sign-blob --yes sbom.cdx.json \
            --output-signature sbom.cdx.json.sig \
            --output-certificate sbom.cdx.json.pem

      - name: Verify SBOM signature
        run: |
          cosign verify-blob \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/release-gate.yml@.*$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate sbom.cdx.json.pem \
            --signature sbom.cdx.json.sig \
            sbom.cdx.json >/dev/null

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: repository-sbom
          path: |
            sbom.cdx.json
            sbom.cdx.json.sig
            sbom.cdx.json.pem

  docker-compose-smoke:
    name: Docker Compose Smoke Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start compose stack
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          for i in {1..90}; do
            if curl -sf http://127.0.0.1:8080/api/health >/dev/null; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Health endpoint did not become ready in time" >&2
          docker compose logs || true
          exit 1

      - name: Show service status
        run: docker compose ps

      - name: Stop compose stack
        if: always()
        run: docker compose down -v

      - name: Upload compose logs
        if: always()
        run: docker compose logs > compose-smoke.log || true

      - name: Publish compose logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-smoke-log
          path: compose-smoke.log
